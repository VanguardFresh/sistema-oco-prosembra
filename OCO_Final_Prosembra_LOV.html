            init() {
                // ===== SISTEMA DE AUTO-ACTUALIZACIÓN =====
                const APP_VERSION = '7.1.5'; // Incrementar este número con cada actualización
                const storedVersion = localStorage.getItem('appVersion');
                
                if (storedVersion && storedVersion !== APP_VERSION) {
                    console.log(`🔄 Nueva versión detectada: ${storedVersion} → ${APP_VERSION}`);
                    console.log('🧹 Limpiando caché y recargando...');
                    
                    // Limpiar todo el localStorage EXCEPTO googleSheetURL
                    const googleSheetURL = localStorage.getItem('googleSheetURL');
                    localStorage.clear();
                    if (googleSheetURL) {
                        localStorage.setItem('googleSheetURL', googleSheetURL);
                    }
                    localStorage.setItem('appVersion', APP_VERSION);
                    
                    // Forzar recarga completa (limpia caché del navegador)
                    window.location.reload(true);
                    return;
                }
                
                // Primera vez que se carga la app
                if (!storedVersion) {
                    console.log(`✨ Primera carga - Versión: ${APP_VERSION}`);
                    localStorage.setItem('appVersion', APP_VERSION);
                }
                // ===== FIN AUTO-ACTUALIZACIÓN =====
                
                // 1. Primero revisar si viene URL en parámetros de la URL (para compartir)
                const urlParams = new URLSearchParams(window.location.search);
                const sharedURL = urlParams.get('config');
                
                if (sharedURL) {
                    try {
                        // Decodificar y guardar
                        const decodedURL = atob(sharedURL);
                        this.data.googleSheetURL = decodedURL;
                        localStorage.setItem('googleSheetURL', decodedURL);
                        console.log('✅ Configuración cargada desde link compartido');
                    } catch (e) {
                        console.error('Error decodificando URL compartida:', e);
                    }
                }
                
                // 2. Si no, usar localStorage
                if (!this.data.googleSheetURL) {
                    this.data.googleSheetURL = localStorage.getItem('googleSheetURL');
                }
                
                // Cargar fuente de datos seleccionada
                const savedDataSource = localStorage.getItem('selectedDataSource');
                if (savedDataSource && (savedDataSource === 'todos' || savedDataSource === 'prosembra' || savedDataSource === 'losolivos')) {
                    this.data.selectedDataSource = savedDataSource;
                }
                
                // 3. Cargar datos cacheados según la fuente seleccionada
                const cacheKey = `cachedOCOData_${this.data.selectedDataSource}`;
                const cached = localStorage.getItem(cacheKey);
                if (cached) {
                    try {
                        this.data.cachedData = JSON.parse(cached);
                    } catch (e) {
                        console.error('Error loading cached data:', e);
                    }
                }
                
                this.render();
            },

            generateShareableLink() {
                if (!this.data.googleSheetURL) {
                    alert('No hay URL configurada');
                    return;
                }
                
                // Codificar URL en base64
                const encoded = btoa(this.data.googleSheetURL);
                
                // Obtener URL base (sin parámetros)
                const baseURL = window.location.origin + window.location.pathname;
                
                // Generar link compartible
                const shareableLink = `${baseURL}?config=${encoded}`;
                
                // Copiar al portapapeles
                navigator.clipboard.writeText(shareableLink).then(() => {
                    // Mostrar notificación
                    this.showNotification('✅ Link copiado al portapapeles. Comparte este link con tu equipo.', 'success');
                }).catch(() => {
                    // Si falla, mostrar en alerta
                    prompt('Copia este link para compartir:', shareableLink);
                });
            },

            showNotification(message, type = 'info') {
                const notification = document.createElement('div');
                notification.id = 'notification';
                notification.textContent = message;
                
                const bgColor = type === 'success' ? 'bg-emerald-600' : 
                               type === 'error' ? 'bg-rose-600' :

                notification.className = `fixed top-4 right-4 ${bgColor} text-white px-6 py-3 rounded-lg shadow-lg z-50 fade-in max-w-md`;
                
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.remove();
                }, 5000);

            async preloadAllDataSources() {
                if (this.data.isPreloading) return;
                
                this.data.isPreloading = true;
                
                const baseUrl = this.data.googleSheetURL;
                
                // Cargar las 3 fuentes en paralelo
                const loadPromises = [
                    this.loadSingleDataSource('todos', baseUrl),
                    this.loadSingleDataSource('prosembra', baseUrl),

                ];

            async loadSingleDataSource(source, baseUrl) {
                try {
                    const selectedSource = this.data.dataSources[source];
                    let allOcos = [];
                    
                    if (source === 'todos') {
                        // Cargar múltiples hojas
                        const sheetNames = selectedSource.sheetNames;
                        const promises = sheetNames.map(async (sheetName) => {
                            try {
                                const urlWithSheet = `${baseUrl}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
                                const response = await fetch(urlWithSheet);
                                if (response.ok) {
                                    const csvText = await response.text();
                                    const jsonData = this.parseCSV(csvText);
                                    return this.parseExcelData(jsonData);
                                }
                            } catch (error) {
                                console.error(`Error cargando hoja ${sheetName}:`, error);
                            }
                            return [];
                        });
                        
                        const results = await Promise.all(promises);
                        allOcos = results.flat();
                    } else {
                        // Cargar una sola hoja
                        const sheetName = selectedSource.sheetName;
                        const urlWithSheet = `${baseUrl}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
                        const response = await fetch(urlWithSheet);
                        
                        if (response.ok) {
                            const csvText = await response.text();
                            const jsonData = this.parseCSV(csvText);
                            allOcos = this.parseExcelData(jsonData);
                        }
                    }
                    
                    // Guardar en pre-carga Y en caché
                    this.data.preloadedData[source] = allOcos;
                    const cacheKey = `cachedOCOData_${source}`;
                    localStorage.setItem(cacheKey, JSON.stringify(allOcos));
                } catch (error) {
                    console.error(`Error pre-cargando ${source}:`, error);
                    
                    // Intentar cargar desde caché
                    const cacheKey = `cachedOCOData_${source}`;
                    const cached = localStorage.getItem(cacheKey);
                    if (cached) {
                        this.data.preloadedData[source] = JSON.parse(cached);
                    }
                }
            },

            parseCSV(csvText) {
                const lines = csvText.split('\n');
                const headers = this.parseCSVLine(lines[0]);
                const data = [];

                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    
                    const values = this.parseCSVLine(lines[i]);
                    const obj = {};
                    headers.forEach((header, index) => {
                        obj[header] = values[index] || '';
                    });
                    data.push(obj);
                }

                return data;
            },

            parseCSVLine(line) {
                const result = [];
                let current = '';
                let inQuotes = false;

                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    const nextChar = line[i + 1];
                    
                    if (char === '"' && nextChar === '"') {
                        current += '"';
                        i++;
                    } else if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        result.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                result.push(current.trim());
                return result;
            },

            parseExcelData(jsonData) {
                const grouped = {};
                
                jsonData.forEach((row, index) => {
                    const ocoId = row.DOCUMENTO;
                    if (!ocoId) return;

                    if (!grouped[ocoId]) {
                        // Obtener ESTADO con múltiples intentos
                        let estadoValue = 'Sin estado';
                        if (row.ESTADO !== undefined && row.ESTADO !== null && row.ESTADO !== '') {
                            estadoValue = row.ESTADO.toString().trim();
                        } else if (row.Estado !== undefined && row.Estado !== null && row.Estado !== '') {
                            estadoValue = row.Estado.toString().trim();
                        } else if (row.estado !== undefined && row.estado !== null && row.estado !== '') {
                            estadoValue = row.estado.toString().trim();
                        }
                        
                        grouped[ocoId] = {
                            id: ocoId,
                            proveedor: row.RAZON_SOCUAL || 'Sin proveedor',
                            area: row.AREA || 'Sin área',
                            fecha: this.formatDate(row.FECHA),
                            fechaCreacion: this.formatDate(row.FECHA), // Columna FECHA
                            fechaAprobacion: this.formatDate(row.AP), // Columna AP
                            compradora: row.HECHOPOR ? row.HECHOPOR.toString().trim() : 'N/A', // Columna HECHOPOR
                            estado: estadoValue,
                            estadoTracking: row['ESTADO TRACKING'] ? row['ESTADO TRACKING'].toString().trim() : 'ORIGEN',
                            tipoEntrega: row.TIPOENTREGA ? row.TIPOENTREGA.toString().trim() : '',
                            leadTimePlanificado: this.parseNumber(row.PLAZO_N),
                            leadTimeReal: this.parseNumber(row.LEAD_TIME), // Columna LEAD_TIME
                            eta: this.formatDate(row.ETA),
                            fechaTentativa: this.formatDate(row['F. TENTATIVA']),
                            fechaTentativa2: this.formatDate(row['F. TENTATIVA2']),
                            fechaRealEnvio: this.formatDate(row.FECHA_PED), // Columna FECHA_PED
                            fechaLlegada: this.formatDate(row.FECHA_RECEPCION), // Columna FECHA_RECEPCION
                            items: []
                        };

                        // Calcular Lead Time Real si no viene en el Excel
                        if (!grouped[ocoId].leadTimeReal && grouped[ocoId].fechaRealEnvio && grouped[ocoId].fechaLlegada) {
                            const envio = new Date(grouped[ocoId].fechaRealEnvio);
                            const llegada = new Date(grouped[ocoId].fechaLlegada);
                            const diffTime = llegada - envio;
                            grouped[ocoId].leadTimeReal = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                        }
                    }

                    if (row.DESCRIPCION) {
                        const cantidad = this.parseNumber(row.CANTIDAD);
                        const recibida = this.parseNumber(row.RECIBIDA);
                        const archivada = this.parseNumber(row.ARCHIVADA);
                        
                        // Intentar leer ESTADO ITEM del Excel
                        let estadoItemValue = null;
                        if (row['ESTADO ITEM'] !== undefined && row['ESTADO ITEM'] !== null && row['ESTADO ITEM'] !== '') {
                            estadoItemValue = row['ESTADO ITEM'].toString().trim();
                        }
                        
                        // Si no hay ESTADO ITEM en el Excel, calcularlo automáticamente
                        if (!estadoItemValue || estadoItemValue === 'POR ATENDER' || estadoItemValue === '') {
                            // Lógica de cálculo basada en la fórmula del Excel
                            if (archivada === cantidad) {
                                estadoItemValue = 'ARCHIVADO';
                            } else if (recibida === cantidad) {
                                estadoItemValue = 'ATENDIDO';
                            } else if (recibida > 0) {
                                estadoItemValue = 'POR ATENDER'; // Parcialmente recibido
                            } else {
                                estadoItemValue = 'POR ATENDER';
                            }
                        }
                        
                        grouped[ocoId].items.push({
                            item: row.ITEM || grouped[ocoId].items.length + 1,
                            descripcion: row.DESCRIPCION,
                            cantidad: cantidad,
                            recibida: recibida,
                            saldo: this.parseNumber(row.SALDO),
                            unidad: row.IDMEDIDA || 'UND',
                            estadoItem: estadoItemValue
                        });
                    }
                });

                return Object.values(grouped);
            },

            parseNumber(value) {
                if (!value) return 0;
                const num = parseFloat(value.toString().replace(/,/g, ''));
                return isNaN(num) ? 0 : num;
            },

            formatDate(dateValue) {
                if (!dateValue) return null;
                
                // Formato YYYY-MM-DD ya correcto
                if (typeof dateValue === 'string' && dateValue.match(/^\d{4}-\d{2}-\d{2}/)) {
                    const dateStr = dateValue.split(' ')[0];
                    
                    // Validar que sea una fecha válida
                    const parts = dateStr.split('-');
                    if (parts.length === 3) {
                        const year = parts[0];
                        const month = parts[1];
                        const day = parts[2];
                        
                        // Detectar formato incorrecto YYYY-DD-MM (mes > 12)
                        if (parseInt(month) > 12 && parseInt(day) <= 12) {
                            // Swap month and day
                            return `${year}-${day.padStart(2, '0')}-${month.padStart(2, '0')}`;
                        }
                    }
                    
                    return dateStr;
                }
                
                // Formato D/M/YYYY o M/D/YYYY
                if (typeof dateValue === 'string' && dateValue.match(/^\d{1,2}\/\d{1,2}\/\d{4}/)) {
                    const parts = dateValue.split('/');
                    if (parts.length === 3) {
                        const first = parseInt(parts[0]);
                        const second = parseInt(parts[1]);
                        const year = parts[2];
                        
                        let day, month;
                        
                        // DETECTAR FORMATO AUTOMÁTICAMENTE
                        // Si first > 12, entonces es DD/MM/YYYY
                        if (first > 12) {
                            day = parts[0].padStart(2, '0');
                            month = parts[1].padStart(2, '0');
                        }
                        // Si second > 12, entonces es MM/DD/YYYY (formato americano)
                        else if (second > 12) {
                            month = parts[0].padStart(2, '0');
                            day = parts[1].padStart(2, '0');
                        }
                        // Ambos <= 12, usar heurística: si first <= second, probablemente MM/DD
                        // Esto funciona para la mayoría de casos de F. TENTATIVA
                        else if (first <= 12 && second <= 12) {
                            // Si parece formato americano (first < 13 y second > first frecuentemente)
                            // Asumir MM/DD/YYYY (formato americano más común en Excel)
                            month = parts[0].padStart(2, '0');
                            day = parts[1].padStart(2, '0');
                        }
                        else {
                            // Por defecto DD/MM/YYYY
                            day = parts[0].padStart(2, '0');
                            month = parts[1].padStart(2, '0');
                        }
                        
                        return `${year}-${month}-${day}`;
                    }
                }
                
                // Intentar parsear como fecha de Excel (número serial)
                if (typeof dateValue === 'number') {
                    // Excel serial date (días desde 1900-01-01)
                    const excelEpoch = new Date(1900, 0, 1);
                    const msPerDay = 24 * 60 * 60 * 1000;
                    const date = new Date(excelEpoch.getTime() + (dateValue - 2) * msPerDay);
                    
                    const year = date.getFullYear();
                    const month = String(date.getMonth() + 1).padStart(2, '0');
                    const day = String(date.getDate()).padStart(2, '0');
                    
                    return `${year}-${month}-${day}`;
                }
                
                return null;
            },

            convertDateFormat(dateStr) {
                // Convertir DD/MM/YYYY a YYYY-MM-DD
                if (dateStr && dateStr.includes('/')) {
                    const parts = dateStr.split('/');
                    if (parts.length === 3) {
                        const day = parts[0].padStart(2, '0');
                        const month = parts[1].padStart(2, '0');
                        const year = parts[2];
                        return `${year}-${month}-${day}`;
                    }
                }
                return dateStr;
            },

            processData() {
                // Limpiar índices
                this.data.ocoMap = new Map();
                this.data.proveedorIndex = new Map();
                this.data.areaIndex = new Map();
                this.data.estadoIndex = new Map();
                
                const areasSet = new Set();
                
                // Un solo loop para crear todos los índices
                this.data.ocos.forEach(oco => {
                    // Índice principal (por ID)
                    this.data.ocoMap.set(oco.id, oco);
                    
                    // Índice por proveedor
                    if (!this.data.proveedorIndex.has(oco.proveedor)) {
                        this.data.proveedorIndex.set(oco.proveedor, []);
                    }
                    this.data.proveedorIndex.get(oco.proveedor).push(oco);
                    
                    // Índice por área
                    if (!this.data.areaIndex.has(oco.area)) {
                        this.data.areaIndex.set(oco.area, []);
                    }
                    this.data.areaIndex.get(oco.area).push(oco);
                    
                    // Índice por estado
                    if (!this.data.estadoIndex.has(oco.estado)) {
                        this.data.estadoIndex.set(oco.estado, []);
                    }
                    this.data.estadoIndex.get(oco.estado).push(oco);
                    
                    // Set de áreas
                    areasSet.add(oco.area);
                    
                    // Calcular colores y días (cachear en el objeto)
                    oco.colorEstado = this.calculateColorStatus(oco);
                    oco.diasRestantes = this.calculateDaysRemaining(oco);
                });

                this.data.areas = ['TODAS LAS ÁREAS', ...Array.from(areasSet).sort()];

                // Resetear paginación
                this.data.currentPage = 1;
                this.data.filterCache.clear();
                
                this.filterOcos();
            },

            calculateColorStatus(oco) {
                if (!oco.eta) return 'gris';
                
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const etaDate = new Date(oco.eta);
                etaDate.setHours(0, 0, 0, 0);
                
                const diffTime = etaDate - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays < 0) return 'rojo';
                if (diffDays <= 7) return 'amarillo';
                return 'verde';
            },

            calculateDaysRemaining(oco) {
                // Usar FECHA TENTATIVA en lugar de ETA
                if (!oco.fechaTentativa) return null;
                
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const fechaTentativaDate = new Date(oco.fechaTentativa);
                fechaTentativaDate.setHours(0, 0, 0, 0);
                
                const diffTime = fechaTentativaDate - today;
                return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            },

            filterOcos() {
                // Crear key de caché
                const cacheKey = `${this.data.selectedArea}|${this.data.searchOCO}|${this.data.searchProveedor}|${this.data.filterTipoEntrega}|${this.data.filterEstado}|${this.data.filterFechaTipo}|${this.data.filterFechaDesde}|${this.data.filterFechaHasta}`;
                
                // Verificar caché
                if (this.data.filterCache.has(cacheKey)) {
                    this.data.filteredOcos = this.data.filterCache.get(cacheKey);
                    this.data.currentPage = 1;
                    return;
                }
                
                let filtered = this.data.ocos;

                if (this.data.selectedArea !== 'todas' && this.data.selectedArea !== 'TODAS LAS ÁREAS') {
                    filtered = filtered.filter(oco => oco.area === this.data.selectedArea);
                }

                if (this.data.searchOCO) {
                    const query = this.data.searchOCO.toLowerCase();
                    filtered = filtered.filter(oco => 
                        oco.id.toLowerCase().includes(query)
                    );
                }

                if (this.data.searchProveedor) {

                        // Asegurar formato YYYY-MM-DD

                        // Comparación de strings en formato YYYY-MM-DD
                        return fechaNormalizada >= this.data.filterFechaDesde && 
                               fechaNormalizada <= this.data.filterFechaHasta;
                    });

            // Sistema de Combobox para Áreas
            initAreaCombobox() {
                const input = document.getElementById('areaSearchInput');
                const dropdown = document.getElementById('areaDropdown');
                
                if (!input || !dropdown) return;

                let selectedIndex = -1;

                // Al hacer click, limpiar el input para empezar a escribir
                input.addEventListener('click', () => {
                    // Si está en "Todas las áreas", limpiar el input
                    if (this.data.selectedArea === 'todas' || input.value === 'Todas las áreas') {
                        input.value = '';
                    }
                    this.showAreaDropdown();
                });

                input.addEventListener('focus', () => {
                    // Si está en "Todas las áreas", limpiar el input
                    if (this.data.selectedArea === 'todas' || input.value === 'Todas las áreas') {
                        input.value = '';
                    }
                    this.showAreaDropdown();
                });

                // Al perder el foco, si está vacío y selectedArea es 'todas', volver a mostrar "Todas las áreas"
                input.addEventListener('blur', () => {
                    setTimeout(() => {
                        if (!dropdown.classList.contains('hidden')) return; // No hacer nada si el dropdown está abierto
                        if (input.value === '' && this.data.selectedArea === 'todas') {
                            input.value = 'Todas las áreas';
                        }
                    }, 200);
                });

                // Filtrar mientras se escribe
                input.addEventListener('input', (e) => {
                    this.filterAreaOptions(e.target.value);
                    selectedIndex = -1;
                });

                // Navegación con teclado
                input.addEventListener('keydown', (e) => {
                    const options = dropdown.querySelectorAll('.area-option');
                    
                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        selectedIndex = Math.min(selectedIndex + 1, options.length - 1);
                        this.highlightOption(options, selectedIndex);
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        selectedIndex = Math.max(selectedIndex - 1, 0);
                        this.highlightOption(options, selectedIndex);
                    } else if (e.key === 'Enter') {
                        e.preventDefault();
                        if (selectedIndex >= 0 && options[selectedIndex]) {
                            options[selectedIndex].click();
                        }
                    } else if (e.key === 'Escape') {
                        dropdown.classList.add('hidden');
                    }
                });

                // Cerrar dropdown al hacer click fuera
                document.addEventListener('click', (e) => {
                    if (!input.contains(e.target) && !dropdown.contains(e.target)) {
                        dropdown.classList.add('hidden');
                    }
                });
            },

                        }"
                        data-area="${area}"
                    >
                        ${this.data.selectedArea === area ? '✓ ' : ''}${area}
                    </div>
                `).join('');

                // Agregar event listeners a las opciones
                optionsContainer.querySelectorAll('.area-option').forEach(option => {
                    option.addEventListener('click', () => {
                        const area = option.getAttribute('data-area');
                        this.selectArea(area);
                    });

            highlightOption(options, index) {
                options.forEach((opt, i) => {
                    if (i === index) {
                        opt.classList.add('bg-[#4A5563]');
                        opt.scrollIntoView({ block: 'nearest' });
                    } else {
                        opt.classList.remove('bg-[#4A5563]');

            startVerificationTimer() {
                if (this.verificationTimer) clearInterval(this.verificationTimer);
                
                this.verificationTimer = setInterval(() => {
                    const timerElement = document.getElementById('verificationTimer');
                    if (!timerElement) {
                        clearInterval(this.verificationTimer);
                        return;
                    }

                    const ahora = Date.now();
                    const expira = this.data.registrationData.codigoExpira;
                    const diff = expira - ahora;

                    if (diff <= 0) {
                        timerElement.textContent = '0:00 - Código expirado';
                        clearInterval(this.verificationTimer);
                    } else {
                        const minutos = Math.floor(diff / 60000);
                        const segundos = Math.floor((diff % 60000) / 1000);
                        timerElement.textContent = `${minutos}:${segundos.toString().padStart(2, '0')}`;
                    }
                }, 1000);
            },

                // Verificar código (comparación simple)

                                const cleanValues = values.map(v => v.replace(/^"|"$/g, '').trim());
                                
                                return {
                                    id: cleanValues[0] || '',
                                    nombre: cleanValues[1] || '',
                                    email: cleanValues[2] || '',
                                    password: cleanValues[3] || '',
                                    telefono: cleanValues[4] || '',
                                    area: cleanValues[5] || '',
                                    fecha_registro: cleanValues[6] || '',
                                    estado: cleanValues[7] || 'ACTIVO',
                                    codigo: cleanValues[8] || '',
                                    codigo_expira: cleanValues[9] || ''
                                };
                            }).filter(u => u.email && u.email.trim() !== '');
                            
                            return usuarios;
                        }
                    } catch (csvError) {
                        console.log('CSV method failed, trying JSON...');
                    }
                    
                    // Si CSV falla, intentar con JSON
                    const jsonUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
                    const jsonResponse = await fetch(jsonUrl);
                    const text = await jsonResponse.text();
                    
                    if (text.includes('Invalid query') || text.includes('no se encuentra')) {
                        return [];
                    }
                    
                    const jsonText = text.substring(47).slice(0, -2);
                    const data = JSON.parse(jsonText);

                    if (!data.table || !data.table.rows || data.table.rows.length === 0) {
                        return [];
                    }

                    const usuarios = data.table.rows.map(row => ({
                        id: row.c[0]?.v || '',
                        nombre: row.c[1]?.v || '',
                        email: row.c[2]?.v || '',
                        password: row.c[3]?.v || '',
                        telefono: row.c[4]?.v || '',
                        area: row.c[5]?.v || '',
                        fecha_registro: row.c[6]?.v || '',
                        estado: row.c[7]?.v || 'ACTIVO',
                        codigo: row.c[8]?.v || '',
                        codigo_expira: row.c[9]?.v || ''
                    })).filter(u => u.email);

                    return usuarios;
                } catch (error) {
                    console.error('Error al obtener usuarios:', error);
                    // Como fallback, intentar leer de localStorage si hay datos guardados
                    const localUsers = localStorage.getItem('usersBackup');
                    if (localUsers) {
                        return JSON.parse(localUsers);
                    }
                    return [];
                }

                if (this.data.preloadedData[source]) {

                    this.data.ocos = this.data.preloadedData[source];
                    this.processData();

                // Remover listener anterior si existe
                if (this.scrollListener) {
                    window.removeEventListener('scroll', this.scrollListener);
                }
                
                // Crear nuevo listener con throttling
                let ticking = false;
                this.scrollListener = () => {
                    if (!ticking) {
                        window.requestAnimationFrame(() => {
                            const scrollHeight = document.documentElement.scrollHeight;
                            const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
                            const clientHeight = document.documentElement.clientHeight;
                            
                            // Si está a 300px del final, cargar más
                            if (scrollHeight - scrollTop - clientHeight < 300) {
                                const totalToShow = this.data.itemsPerPage * this.data.currentPage;
                                if (this.data.filteredOcos.length > totalToShow && !this.data.isLoadingMore) {
                                    this.loadMoreOcos();

                            }
                            
                            ticking = false;
                        });
                        ticking = true;

                };
                
                window.addEventListener('scroll', this.scrollListener);

            formatNumber(num) {
                if (num === null || num === undefined || isNaN(num)) return '0';
                return num.toLocaleString('en-US');
            },

            getStatusColor(color) {
                switch(color) {
                    case 'verde': return 'bg-emerald-500';
                    case 'amarillo': return 'bg-amber-500';
                    case 'rojo': return 'bg-rose-600';
                    default: return 'bg-slate-400';
                }
            },

                switch(color) {
                    case 'verde': return 'A TIEMPO';
                    case 'amarillo': return 'PRÓXIMO';
                    case 'rojo': return 'VENCIDO';
                    default: return 'SIN DATOS';
                }
            },

                switch(color) {
                    case 'verde': return '✓';
                    case 'amarillo': return '⏰';
                    case 'rojo': return '⚠';
                    default: return '📦';
                }
            },

            getTrackingStatus(oco) {
                // Usar ESTADO TRACKING del Excel directamente
                const tracking = oco.estadoTracking ? oco.estadoTracking.toUpperCase().trim() : '';
                const estadoTexto = oco.estado ? oco.estado.toLowerCase().trim() : '';
                
                // Si está atendido total, está entregado (nivel 4)
                if (estadoTexto.includes('atendido total')) {
                    return 4;
                }
                
                // Mapear estados del Excel a niveles del timeline
                if (tracking === 'DESTINO') {
                    return 3;
                }
                
                if (tracking === 'TRANSITO') {
                    return 2;
                }
                
                // ORIGEN o cualquier otro estado
                return 1;
            },

                                                class="w-full bg-[#3C4651] text-white px-3 py-2 rounded-lg border border-[#558BA5]/30 focus:outline-none focus:ring-2 focus:ring-[#6ECBC9] text-sm"
                                                required
                                            />
                                        </div>

                                        <!-- Teléfono -->
                                        <div class="col-span-2">
                                            <label class="block text-xs font-medium text-gray-400 mb-1">Teléfono</label>
                                            <div class="flex gap-2">
                                                <select 
                                                    id="codigoPais"
                                                    class="bg-[#3C4651] text-white px-2 py-2 rounded-lg border border-[#558BA5]/30 focus:outline-none focus:ring-2 focus:ring-[#6ECBC9] text-sm"
                                                >
                                                    <option value="+51">🇵🇪 +51</option>
                                                    <option value="+56">🇨🇱 +56</option>
                                                    <option value="+54">🇦🇷 +54</option>
                                                    <option value="+52">🇲🇽 +52</option>
                                                    <option value="+57">🇨🇴 +57</option>
                                                    <option value="+1">🇺🇸 +1</option>
                                                </select>
                                                <input 
                                                    type="tel" 
                                                    id="regTelefono"
                                                    placeholder="987654321"
                                                    class="flex-1 bg-[#3C4651] text-white px-3 py-2 rounded-lg border border-[#558BA5]/30 focus:outline-none focus:ring-2 focus:ring-[#6ECBC9] text-sm"
                                                    required
                                                />
                                            </div>
                                        </div>

                                        <!-- Área -->
                                        <div class="col-span-2">
                                            <label class="block text-xs font-medium text-gray-400 mb-1">Área</label>
                                            <select 
                                                id="regArea"
                                                class="w-full bg-[#3C4651] text-white px-3 py-2 rounded-lg border border-[#558BA5]/30 focus:outline-none focus:ring-2 focus:ring-[#6ECBC9] text-sm"
                                                required
                                            >
                                                <option value="">Selecciona tu área</option>
                                                ${areasOptions}
                                            </select>
                                        </div>

                                        <!-- Botón Registrarse -->
                                        <div class="col-span-2 mt-2">
                                            <button 
                                                type="submit"
                                                class="w-full bg-[#6ECBC9] hover:bg-[#558BA5] text-white font-bold py-2.5 px-4 rounded-lg transition-all text-sm"
                                            >
                                                Registrarse
                                            </button>
                                        </div>
                                    </div>
                                </form>

                                <div class="mt-4 text-center">
                                    <button 
                                        onclick="app.goBackToUserLogin()"
                                        class="text-gray-400 hover:text-white transition-colors text-xs"
                                    >
                                        ← Ya tengo cuenta
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            renderUserVerifyView() {
                return `
                    <div class="min-h-screen flex items-center justify-center p-4">
                        <div class="max-w-md w-full">
                            <div class="text-center mb-8">
                                <div class="w-16 h-16 bg-[#6ECBC9] bg-opacity-20 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <svg class="w-8 h-8 text-[#6ECBC9]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                                    </svg>
                                </div>
                                <h1 class="text-4xl font-bold text-white mb-2">Verifica tu Email</h1>
                                <p class="text-gray-400">Ingresa el código de 4 dígitos que enviamos a:</p>
                                <p class="text-[#6ECBC9] font-medium mt-2">${this.data.registrationData.email}</p>
                            </div>

                            <div class="bg-[#2A3038] border border-[#558BA5]/30 rounded-lg p-8">
                                <form onsubmit="app.handleVerifyCode(event)">
                                    <div class="space-y-6">
                                        <div class="flex justify-center gap-3">
                                            <input 
                                                type="text" 
                                                id="code1"
                                                maxlength="1"
                                                pattern="[0-9]"
                                                inputmode="numeric"
                                                class="w-14 h-14 bg-[#3C4651] text-white text-center text-2xl font-bold rounded-lg border-2 border-[#558BA5]/30 focus:outline-none focus:ring-2 focus:ring-[#6ECBC9] focus:border-[#6ECBC9]"
                                                oninput="this.value=this.value.replace(/[^0-9]/g,''); if(this.value) document.getElementById('code2').focus()"
                                                onkeydown="if(event.key==='Backspace' && !this.value) return true"
                                                required
                                            />
                                            <input 
                                                type="text" 
                                                id="code2"
                                                maxlength="1"
                                                pattern="[0-9]"
                                                inputmode="numeric"
                                                class="w-14 h-14 bg-[#3C4651] text-white text-center text-2xl font-bold rounded-lg border-2 border-[#558BA5]/30 focus:outline-none focus:ring-2 focus:ring-[#6ECBC9] focus:border-[#6ECBC9]"
                                                oninput="this.value=this.value.replace(/[^0-9]/g,''); if(this.value) document.getElementById('code3').focus()"
                                                onkeydown="if(event.key==='Backspace' && !this.value) document.getElementById('code1').focus()"
                                                required
                                            />
                                            <input 
                                                type="text" 
                                                id="code3"
                                                maxlength="1"
                                                pattern="[0-9]"
                                                inputmode="numeric"
                                                class="w-14 h-14 bg-[#3C4651] text-white text-center text-2xl font-bold rounded-lg border-2 border-[#558BA5]/30 focus:outline-none focus:ring-2 focus:ring-[#6ECBC9] focus:border-[#6ECBC9]"
                                                oninput="this.value=this.value.replace(/[^0-9]/g,''); if(this.value) document.getElementById('code4').focus()"
                                                onkeydown="if(event.key==='Backspace' && !this.value) document.getElementById('code2').focus()"
                                                required
                                            />
                                            <input 
                                                type="text" 
                                                id="code4"
                                                maxlength="1"
                                                pattern="[0-9]"
                                                inputmode="numeric"
                                                class="w-14 h-14 bg-[#3C4651] text-white text-center text-2xl font-bold rounded-lg border-2 border-[#558BA5]/30 focus:outline-none focus:ring-2 focus:ring-[#6ECBC9] focus:border-[#6ECBC9]"
                                                oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                                                onkeydown="if(event.key==='Backspace' && !this.value) document.getElementById('code3').focus()"
                                                required
                                            />
                                        </div>

                                        <div class="text-center">
                                            <p class="text-gray-400 text-sm mb-2">Tiempo restante:</p>
                                            <p id="verificationTimer" class="text-[#6ECBC9] text-2xl font-bold mono">5:00</p>
                                        </div>

                                        <button 
                                            type="submit"
                                            class="w-full bg-[#6ECBC9] hover:bg-[#558BA5] text-white font-bold py-3 px-4 rounded-lg transition-all"
                                        >
                                            Verificar Código
                                        </button>

                                        <div class="text-center">
                                            <button 
                                                type="button"
                                                onclick="app.enviarCodigoVerificacion()"
                                                class="text-gray-400 hover:text-[#6ECBC9] transition-colors text-sm"
                                            >
                                                Reenviar código
                                            </button>
                                        </div>
                                    </div>
                                </form>

                                <div class="mt-6 text-center">
                                    <button 
                                        onclick="app.goBackToUserLogin()"
                                        class="text-gray-400 hover:text-white transition-colors text-sm"
                                    >
                                        ← Cancelar registro
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            attachEventListeners() {
                const searchOCOInput = document.getElementById('searchOCOInput');
                if (searchOCOInput) {
                    searchOCOInput.addEventListener('input', (e) => this.handleSearchOCOChange(e));
                }

                const searchProveedorInput = document.getElementById('searchProveedorInput');
                if (searchProveedorInput) {
                    searchProveedorInput.addEventListener('input', (e) => this.handleSearchProveedorChange(e));
                }

                const areaSelect = document.getElementById('areaSelect');
                if (areaSelect) {
                    areaSelect.addEventListener('change', (e) => this.handleAreaChange(e));
                }

                // Inicializar combobox de áreas
                this.initAreaCombobox();

                // Inicializar dropdown custom de empresas
                this.initDataSourceDropdown();

                const ocoCards = document.querySelectorAll('[data-oco-id]');
                ocoCards.forEach(card => {
                    card.addEventListener('click', () => {
                        const ocoId = card.getAttribute('data-oco-id');
                        const oco = this.data.ocos.find(o => o.id === ocoId);
                        if (oco) this.selectOco(oco);
                    });
                });

                // Cerrar menú de usuario al hacer click fuera
                document.addEventListener('click', (e) => {
                    const userMenu = document.getElementById('userMenu');
                    const userButton = e.target.closest('button[onclick*="toggleUserMenu"]');
                    
                    if (userMenu && !userMenu.contains(e.target) && !userButton) {
                        userMenu.classList.add('hidden');
                    }
                });
            }
        };

        const app = App;
        app.init();
    </script>
</body>
</html>
